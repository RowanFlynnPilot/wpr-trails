name: Weekly Pipeline

# Refreshes slow-changing data: trail geometry, elevation, auto-editorial.
# Runs Sundays at 7am UTC (~2am CT) plus manual dispatch from Actions tab.

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Overpass-bound enrichment scales with trail count. At 341 trails the
    # editorial + trailheads passes each take ~28 min at the polite 5s
    # rate-limit. 120 leaves headroom for future growth and transient
    # rate-limit backoffs.
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull source data
        run: |
          python -m scrapers.county_boundaries
          python -m scrapers.osm_trails
          python -m scrapers.osm_named_paths
          python -m scrapers.dnr_ice_age
          python -m scrapers.dnr_state_trails
          python -m scrapers.osm_landcover

      - name: Build trails
        run: |
          python -m transforms.build_trails
          python -m transforms.enrich_elevation

      - name: Pull SSURGO soil data
        # Depends on built trails — queries USDA per trail geometry.
        # ~2 min for 74 trails at 1s rate-limit.
        run: python -m scrapers.usda_ssurgo

      - name: Auto-derive editorial
        # Consumes osm_forest.json + ssurgo.json + OSM Overpass per trail.
        # ~7 min total at 5s rate-limit between Overpass calls.
        run: python -m transforms.enrich_editorial_auto

      - name: Snap trailhead coords
        # One Overpass query per trail for nearby amenity=parking, snapped
        # to the trail endpoint closest to the parking. ~6 min total.
        run: python -m transforms.enrich_trailheads

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/ data/editorial_auto.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly pipeline: refresh trails + editorial auto"
            git push
          fi
